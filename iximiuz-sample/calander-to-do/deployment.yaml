# ─────────────────────────────────────────────────────────────
#  Deployment — calendar-todo-app
#
#  Serves index.html (from ConfigMap) via nginx.
#  The ConfigMap is mounted at /usr/share/nginx/html/index.html
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-todo-app
  labels:
    app: calendar-todo-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: calendar-todo-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: calendar-todo-app

    spec:
      # Allow scheduling on nodes tainted with:
      # environment=production:NoSchedule
      tolerations:
        - key: "environment"
          operator: "Equal"
          value: "production"
          effect: "NoSchedule"

      # Optional: Uncomment if you want pods to run ONLY on production nodes
      # nodeSelector:
      #   environment: production

      volumes:
        - name: html-volume
          configMap:
            name: calendar-todo-app-html
            items:
              - key: index.html
                path: index.html

      containers:
        - name: nginx
          image: nginx:1.27-alpine

          ports:
            - name: http
              containerPort: 80

          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html

          # Guaranteed QoS (requests = limits)
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
---
# ─────────────────────────────────────────────────────────────
#  Service — calendar-todo-app-svc
#
#  Change type to LoadBalancer if you are on a cloud provider
#  (EKS, GKE, AKS) and want a public IP automatically.
#  Use NodePort for bare-metal / Minikube / Kind.
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: calendar-todo-app-svc
  labels:
    app: calendar-todo-app
spec:
  type: NodePort                       # ← change to LoadBalancer for cloud
  selector:
    app: calendar-todo-app                  # must match Deployment pod labels
  ports:
    - name: http
      protocol: TCP
      port: 80                         # ClusterIP port
      targetPort: 80                   # container port
      nodePort: 30080                  # external port on every node (30000-32767)
                                       # remove this line if type=LoadBalancer
