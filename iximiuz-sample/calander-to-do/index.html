<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📅 Task Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Reset ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --glass:rgba(255,255,255,0.11);
  --glass-b:rgba(255,255,255,0.20);
  --glass-h:rgba(255,255,255,0.18);
  --text:#fff;
  --muted:rgba(255,255,255,0.55);
  --accent:#4fc3f7;
  --accent2:#7c4dff;
  --danger:#ff5370;
  --success:#69f0ae;
  --warn:#ffd740;
  --r:18px;
  --rs:10px;
  --sh:0 8px 32px rgba(0,0,0,0.30);
  --tr:.2s cubic-bezier(.4,0,.2,1);
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  background:
    linear-gradient(135deg,rgba(8,18,55,0.58) 0%,rgba(18,0,55,0.48) 100%),
    url('https://4kwallpapers.com/images/wallpapers/samsung-galaxy-note10-bubble-blue-stock-android-10-1920x1080-730.jpg')
    center/cover no-repeat fixed;
  color:var(--text);
  overflow-x:hidden;
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.22);border-radius:3px}

/* ── Glass ──────────────────────────────────────────────────── */
.glass{
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--glass-b);
  border-radius:var(--r);
  box-shadow:var(--sh);
}

/* ── Layout ─────────────────────────────────────────────────── */
.wrap{max-width:1140px;margin:0 auto;padding:20px 16px 56px}

/* ── App Header ─────────────────────────────────────────────── */
.app-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 24px;margin-bottom:18px;
}
.app-head-left h1{font-size:1.35rem;font-weight:700;letter-spacing:-.4px}
.app-head-left p{font-size:.78rem;color:var(--muted);margin-top:3px}
.head-actions{display:flex;gap:10px;align-items:center}

/* ── Theme / icon buttons ───────────────────────────────────── */
.icon-btn{
  background:var(--glass-h);border:1px solid var(--glass-b);
  color:var(--text);border-radius:50%;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1rem;transition:background var(--tr);
}
.icon-btn:hover{background:rgba(255,255,255,0.28)}

/* ── Stats ──────────────────────────────────────────────────── */
.stats-row{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.stat{
  flex:1;min-width:90px;padding:14px 16px;border-radius:var(--rs);
  text-align:center;
}
.stat-n{font-size:1.7rem;font-weight:700;line-height:1}
.stat-l{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:4px}
.s-total .stat-n{color:var(--accent)}
.s-done  .stat-n{color:var(--success)}
.s-pend  .stat-n{color:var(--warn)}

/* ── Main Grid ──────────────────────────────────────────────── */
.main-grid{display:grid;grid-template-columns:340px 1fr;gap:18px}
@media(max-width:820px){.main-grid{grid-template-columns:1fr}}

/* ── Calendar ───────────────────────────────────────────────── */
.cal-panel{padding:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav h3{font-size:1rem;font-weight:600}
.nav-btn{
  background:var(--glass-h);border:1px solid var(--glass-b);
  color:#fff;border-radius:50%;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.95rem;transition:background var(--tr);
}
.nav-btn:hover{background:rgba(255,255,255,0.3)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hdr{
  text-align:center;font-size:.65rem;font-weight:600;
  text-transform:uppercase;color:var(--muted);padding:2px 0 8px;
  letter-spacing:.06em;
}
.cal-day{
  aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  border-radius:9px;cursor:pointer;font-size:.82rem;font-weight:500;
  transition:background var(--tr),transform var(--tr);
  position:relative;user-select:none;
}
.cal-day:hover{background:var(--glass-h);transform:scale(1.09)}
.cal-day.today{border:2px solid var(--accent);color:var(--accent)}
.cal-day.selected{
  background:linear-gradient(135deg,#4fc3f7,#7c4dff);
  color:#fff;font-weight:700;
  box-shadow:0 4px 16px rgba(79,195,247,0.38);
}
.cal-day.selected:hover{transform:scale(1.09)}
.cal-badge{
  font-size:.5rem;background:var(--warn);color:#000;
  border-radius:99px;padding:1px 4px;font-weight:700;margin-top:2px;line-height:1.5;
}

/* ── Task Panel ─────────────────────────────────────────────── */
.task-panel{padding:22px;display:flex;flex-direction:column;gap:14px}

.tp-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tp-head h4{font-size:1rem;font-weight:600}
.date-pill{
  background:linear-gradient(135deg,rgba(79,195,247,.22),rgba(124,77,255,.22));
  border:1px solid rgba(79,195,247,.35);border-radius:99px;
  padding:4px 14px;font-size:.78rem;font-weight:500;color:var(--accent);
}

/* ── Search Bar ─────────────────────────────────────────────── */
.search-wrap{position:relative}
.search-wrap .s-icon{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:.85rem;color:var(--muted);pointer-events:none;
}
.search-input{
  width:100%;background:rgba(255,255,255,0.09);
  border:1px solid var(--glass-b);border-radius:var(--rs);
  color:#fff;padding:10px 14px 10px 38px;font-size:.88rem;
  outline:none;transition:border var(--tr),background var(--tr);
  font-family:inherit;
}
.search-input::placeholder{color:rgba(255,255,255,0.38)}
.search-input:focus{border-color:var(--accent);background:rgba(255,255,255,0.14)}

/* search dropdown */
.search-dropdown{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:rgba(14,20,50,0.97);
  border:1px solid var(--glass-b);border-radius:var(--rs);
  max-height:220px;overflow-y:auto;z-index:200;display:none;
  box-shadow:var(--sh);
}
.search-dropdown.open{display:block}
.s-result{
  padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.07);
  transition:background var(--tr);
}
.s-result:last-child{border-bottom:none}
.s-result:hover{background:rgba(79,195,247,0.12)}
.s-result-subj{font-size:.88rem;font-weight:600}
.s-result-meta{font-size:.72rem;color:var(--muted);margin-top:2px}

/* ── Filter Row ─────────────────────────────────────────────── */
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.glass-sel{
  background:rgba(255,255,255,0.09);border:1px solid var(--glass-b);
  border-radius:var(--rs);color:#fff;padding:8px 12px;
  font-size:.82rem;outline:none;cursor:pointer;font-family:inherit;
  transition:border var(--tr);
}
.glass-sel option{background:#0e1432;color:#fff}
.glass-sel:focus{border-color:var(--accent)}

/* ── Add Task Button ────────────────────────────────────────── */
.btn-add-task{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,rgba(79,195,247,.2),rgba(124,77,255,.2));
  border:1px dashed rgba(79,195,247,.45);border-radius:var(--rs);
  color:var(--accent);padding:11px 16px;cursor:pointer;
  font-size:.88rem;font-weight:500;font-family:inherit;
  transition:background var(--tr),border var(--tr);width:100%;
  justify-content:center;
}
.btn-add-task:hover{
  background:linear-gradient(135deg,rgba(79,195,247,.32),rgba(124,77,255,.32));
  border-style:solid;
}

/* ── Task List ──────────────────────────────────────────────── */
.task-list{display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;padding-right:2px}

.task-card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:12px 14px;
  cursor:pointer;transition:background var(--tr),border var(--tr),transform var(--tr);
  animation:slideIn .18s ease;position:relative;
}
.task-card:hover{background:rgba(255,255,255,0.11);border-color:rgba(79,195,247,.3);transform:translateY(-1px)}
.task-card.done{opacity:.52}
.task-card.done .tc-subject{text-decoration:line-through}

@keyframes slideIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.tc-top{display:flex;align-items:flex-start;gap:10px}
.tc-check{
  width:19px;height:19px;border-radius:50%;flex-shrink:0;margin-top:1px;
  border:2px solid rgba(255,255,255,0.3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--tr),border var(--tr);
}
.tc-check:hover{border-color:var(--success)}
.tc-check.checked{background:var(--success);border-color:var(--success)}
.tc-check.checked::after{content:'✓';font-size:.6rem;color:#000;font-weight:800}

.tc-body{flex:1;min-width:0}
.tc-subject{font-size:.9rem;font-weight:600;line-height:1.35;word-break:break-word}
.tc-preview{
  font-size:.76rem;color:var(--muted);margin-top:3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tc-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}

.p-tag{
  font-size:.62rem;font-weight:700;border-radius:99px;
  padding:2px 9px;letter-spacing:.05em;text-transform:uppercase;
}
.p-high  {background:rgba(255,83,112,.2);color:#ff5370;border:1px solid rgba(255,83,112,.3)}
.p-medium{background:rgba(255,215,64,.2);color:#ffd740;border:1px solid rgba(255,215,64,.3)}
.p-low   {background:rgba(105,240,174,.2);color:#69f0ae;border:1px solid rgba(105,240,174,.3)}

.tc-actions{display:flex;gap:5px;flex-shrink:0}
.ic-btn{
  background:transparent;border:1px solid rgba(255,255,255,0.15);
  color:var(--muted);border-radius:7px;width:27px;height:27px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.72rem;transition:all var(--tr);
}
.ic-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.ic-btn.del:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,83,112,.1)}
.ic-btn.edit:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,195,247,.1)}

.empty-state{text-align:center;padding:36px 0;color:var(--muted)}
.empty-state .ei{font-size:2.6rem;margin-bottom:8px}
.empty-state p{font-size:.85rem}

/* ── Toolbar ────────────────────────────────────────────────── */
.toolbar{
  padding:13px 20px;margin-top:18px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;
}
.tool-btn{
  background:rgba(255,255,255,0.09);border:1px solid var(--glass-b);
  color:var(--text);border-radius:var(--rs);padding:8px 16px;
  font-size:.8rem;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:background var(--tr),transform var(--tr);
}
.tool-btn:hover{background:rgba(255,255,255,0.18);transform:translateY(-1px)}

/* ── Modal Overlay ──────────────────────────────────────────── */
.overlay{
  display:none;position:fixed;inset:0;z-index:900;
  background:rgba(0,0,10,0.65);backdrop-filter:blur(4px);
  align-items:center;justify-content:center;padding:16px;
}
.overlay.open{display:flex}

/* ── Task Modal ─────────────────────────────────────────────── */
.task-modal{
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
  background:rgba(14,22,60,0.95);
  border:1px solid rgba(79,195,247,0.3);
  border-radius:20px;box-shadow:0 24px 64px rgba(0,0,0,0.5);
  animation:modalIn .22s ease;
}
@keyframes modalIn{
  from{opacity:0;transform:scale(.94) translateY(16px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

.modal-head{
  padding:20px 22px 16px;border-bottom:1px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-head h3{font-size:1rem;font-weight:600;color:var(--accent)}
.modal-close{
  background:transparent;border:none;color:var(--muted);
  font-size:1.3rem;cursor:pointer;line-height:1;padding:2px 6px;
  border-radius:6px;transition:color var(--tr),background var(--tr);
}
.modal-close:hover{color:#fff;background:rgba(255,255,255,0.1)}

.modal-body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}

.field-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
.field-group{display:flex;flex-direction:column}

.m-input,.m-textarea{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);
  border-radius:var(--rs);color:#fff;padding:11px 14px;
  font-size:.9rem;outline:none;font-family:inherit;
  transition:border var(--tr),background var(--tr);
}
.m-input::placeholder,.m-textarea::placeholder{color:rgba(255,255,255,0.35)}
.m-input:focus,.m-textarea:focus{border-color:var(--accent);background:rgba(255,255,255,0.12)}
.m-textarea{min-height:120px;resize:vertical;line-height:1.55}

.m-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.m-row{grid-template-columns:1fr}}

.modal-foot{
  padding:14px 22px 20px;border-top:1px solid rgba(255,255,255,0.1);
  display:flex;gap:10px;justify-content:flex-end;
}
.btn-primary{
  background:linear-gradient(135deg,#4fc3f7,#7c4dff);
  border:none;color:#fff;border-radius:var(--rs);
  padding:10px 26px;font-size:.88rem;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:opacity var(--tr),transform var(--tr);
}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-cancel{
  background:rgba(255,255,255,0.08);border:1px solid var(--glass-b);
  color:var(--muted);border-radius:var(--rs);
  padding:10px 20px;font-size:.88rem;cursor:pointer;font-family:inherit;
  transition:background var(--tr);
}
.btn-cancel:hover{background:rgba(255,255,255,0.15);color:#fff}

/* ── View Modal (read-only details) ────────────────────────── */
.view-field{
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--rs);padding:12px 14px;font-size:.88rem;
  line-height:1.55;color:var(--text);white-space:pre-wrap;word-break:break-word;
  min-height:36px;
}
.view-field.subject-field{font-size:1rem;font-weight:600}

/* ── Toast ──────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:22px;right:22px;
  background:rgba(14,22,60,0.96);border:1px solid var(--glass-b);
  backdrop-filter:blur(10px);color:#fff;
  padding:11px 20px;border-radius:var(--rs);font-size:.85rem;
  box-shadow:var(--sh);z-index:9999;display:none;
  animation:fadeT .25s ease;
}
@keyframes fadeT{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Light Mode ─────────────────────────────────────────────── */
body.light{
  --glass:rgba(255,255,255,0.58);
  --glass-b:rgba(0,0,0,0.1);
  --glass-h:rgba(255,255,255,0.76);
  --text:#0d1030;
  --muted:rgba(0,0,0,0.48);
  background:
    linear-gradient(135deg,rgba(200,220,255,0.62) 0%,rgba(190,200,255,0.52) 100%),
    url('https://4kwallpapers.com/images/wallpapers/samsung-galaxy-note10-bubble-blue-stock-android-10-1920x1080-730.jpg')
    center/cover no-repeat fixed;
}
body.light .task-modal{background:rgba(235,240,255,0.97);border-color:rgba(79,195,247,0.4)}
body.light .m-input,body.light .m-textarea{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.15);color:#0d1030}
body.light .m-input::placeholder,body.light .m-textarea::placeholder{color:rgba(0,0,0,0.35)}
body.light .view-field{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);color:#0d1030}
body.light .glass-sel,.search-input{color:#0d1030}
body.light .glass-sel option{background:#eef;color:#0d1030}
body.light .search-dropdown{background:rgba(230,235,255,0.98)}
body.light .s-result:hover{background:rgba(79,195,247,0.15)}
body.light #toast{background:rgba(230,235,255,0.98);color:#0d1030}
body.light .task-modal .modal-head h3{color:#0055aa}
body.light .search-input{background:rgba(0,0,0,0.06);color:#0d1030}

@media(max-width:480px){
  .stats-row{gap:8px}
  .stat{padding:10px}
  .stat-n{font-size:1.3rem}
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- ── Task Form Modal ───────────────────────────────────────── -->
<div class="overlay" id="formOverlay" onclick="overlayClick(event,'formOverlay')">
  <div class="task-modal glass">
    <div class="modal-head">
      <h3 id="formTitle">New Task</h3>
      <button class="modal-close" onclick="closeForm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <div class="field-label">Subject <span style="color:var(--danger)">*</span></div>
        <input class="m-input" id="fSubject" placeholder="e.g. Review Q3 Report" maxlength="120">
      </div>
      <div class="field-group">
        <div class="field-label">Details / Notes</div>
        <textarea class="m-textarea" id="fDetails" placeholder="Add context, steps, links or any notes about this task…"></textarea>
      </div>
      <div class="m-row">
        <div class="field-group">
          <div class="field-label">Priority</div>
          <select class="m-input glass-sel" id="fPriority">
            <option value="medium">⚡ Medium</option>
            <option value="high">🔴 High</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
        <div class="field-group">
          <div class="field-label">Date</div>
          <input class="m-input" id="fDate" type="date">
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- ── Task View Modal ───────────────────────────────────────── -->
<div class="overlay" id="viewOverlay" onclick="overlayClick(event,'viewOverlay')">
  <div class="task-modal glass">
    <div class="modal-head">
      <h3>Task Details</h3>
      <button class="modal-close" onclick="closeView()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-group">
        <div class="field-label">Subject</div>
        <div class="view-field subject-field" id="vSubject"></div>
      </div>
      <div class="field-group">
        <div class="field-label">Details</div>
        <div class="view-field" id="vDetails" style="min-height:90px"></div>
      </div>
      <div class="m-row">
        <div class="field-group">
          <div class="field-label">Priority</div>
          <div class="view-field" id="vPriority"></div>
        </div>
        <div class="field-group">
          <div class="field-label">Status</div>
          <div class="view-field" id="vStatus"></div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeView()">Close</button>
      <button class="btn-primary" onclick="editFromView()">✏️ Edit</button>
    </div>
  </div>
</div>

<!-- ── App ───────────────────────────────────────────────────── -->
<div class="wrap">

  <!-- Header -->
  <div class="glass app-head">
    <div class="app-head-left">
      <h1>📅 Task Planner</h1>
      <p>Select a date · add subjects · track details</p>
    </div>
    <div class="head-actions">
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="glass stat s-total"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Total</div></div>
    <div class="glass stat s-done"> <div class="stat-n" id="sDone">0</div> <div class="stat-l">Done</div></div>
    <div class="glass stat s-pend"> <div class="stat-n" id="sPend">0</div> <div class="stat-l">Pending</div></div>
  </div>

  <!-- Main -->
  <div class="main-grid">

    <!-- Calendar -->
    <div class="glass cal-panel">
      <div class="cal-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <h3 id="monthYear"></h3>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="cal-hdr">Su</div><div class="cal-hdr">Mo</div>
        <div class="cal-hdr">Tu</div><div class="cal-hdr">We</div>
        <div class="cal-hdr">Th</div><div class="cal-hdr">Fr</div>
        <div class="cal-hdr">Sa</div>
      </div>
    </div>

    <!-- Task Panel -->
    <div class="glass task-panel">

      <div class="tp-head">
        <h4>Tasks</h4>
        <span class="date-pill" id="datePill"></span>
      </div>

      <!-- Search -->
      <div style="position:relative">
        <div class="search-wrap">
          <span class="s-icon">🔍</span>
          <input class="search-input" id="searchInput"
            placeholder="Search by subject across all dates…"
            oninput="handleSearch()" autocomplete="off">
        </div>
        <div class="search-dropdown" id="searchDrop"></div>
      </div>

      <!-- Filter -->
      <div class="filter-row">
        <select class="glass-sel" id="filterSel" onchange="renderTasks()">
          <option value="all">All Tasks</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
        <select class="glass-sel" id="prioritySel" onchange="renderTasks()">
          <option value="all">All Priorities</option>
          <option value="high">🔴 High</option>
          <option value="medium">⚡ Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>

      <!-- Add Button -->
      <button class="btn-add-task" onclick="openForm()">
        <span style="font-size:1.1rem">＋</span> Add New Task
      </button>

      <!-- List -->
      <div class="task-list" id="taskList"></div>

    </div>
  </div>

  <!-- Toolbar -->
  <div class="glass toolbar">
    <button class="tool-btn" onclick="exportTasks()">💾 Export JSON</button>
    <label class="tool-btn" style="cursor:pointer">
      📥 Import JSON
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importTasks(event)">
    </label>
    <button class="tool-btn" onclick="requestNotif()">🔔 Reminders</button>
    <button class="tool-btn" onclick="clearDay()">🗑️ Clear Day</button>
  </div>

</div>

<script>
/* ── State ─────────────────────────────────────────────────── */
let currentDate  = new Date();
let selectedDate = fmtDate(new Date());
let tasks        = JSON.parse(localStorage.getItem('tp_tasks')) || {};
let isDark       = localStorage.getItem('tp_theme') !== 'light';
let editIdx      = null;   // index being edited in form
let viewDate     = null;   // date of task being viewed
let viewIdx      = null;

if (!isDark) document.body.classList.add('light');
document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';

/* ── Helpers ────────────────────────────────────────────────── */
function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
function todayStr() { return fmtDate(new Date()); }
function save()     { localStorage.setItem('tp_tasks', JSON.stringify(tasks)); }
function esc(s)     {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.style.display = 'none', ms);
}

/* ── Calendar ───────────────────────────────────────────────── */
function renderCalendar() {
  const y = currentDate.getFullYear(), m = currentDate.getMonth();
  document.getElementById('monthYear').textContent =
    currentDate.toLocaleString('default',{month:'long',year:'numeric'});

  const firstDay = new Date(y,m,1).getDay();
  const days     = new Date(y,m+1,0).getDate();
  const today    = todayStr();
  const grid     = document.getElementById('calGrid');

  while (grid.children.length > 7) grid.removeChild(grid.lastChild);

  const cells = Math.ceil((firstDay+days)/7)*7;
  let d = 1;
  for (let i=0; i<cells; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day';
    if (i < firstDay || d > days) {
      cell.style.cursor = 'default';
    } else {
      const full = fmtDate(new Date(y,m,d));
      const cnt  = (tasks[full]||[]).length;
      cell.innerHTML = d;
      if (cnt) {
        const b = document.createElement('div');
        b.className = 'cal-badge'; b.textContent = cnt;
        cell.appendChild(b);
      }
      if (full === today)        cell.classList.add('today');
      if (full === selectedDate) cell.classList.add('selected');
      cell.onclick = () => { selectedDate = full; renderCalendar(); renderTasks(); };
      d++;
    }
    grid.appendChild(cell);
  }

  document.getElementById('datePill').textContent =
    new Date(selectedDate+'T00:00:00').toLocaleDateString('default',
      {weekday:'short',month:'short',day:'numeric'});
}

function changeMonth(s) {
  currentDate.setMonth(currentDate.getMonth()+s);
  renderCalendar();
}

/* ── Task List ──────────────────────────────────────────────── */
function renderTasks() {
  const list = document.getElementById('taskList');
  const filt = document.getElementById('filterSel').value;
  const pFil = document.getElementById('prioritySel').value;
  const day  = tasks[selectedDate] || [];

  list.innerHTML = '';

  const shown = day
    .map((t,i) => ({...t,i}))
    .filter(t => {
      if (filt === 'completed' && !t.done)  return false;
      if (filt === 'pending'   &&  t.done)  return false;
      if (pFil !== 'all' && t.priority !== pFil) return false;
      return true;
    });

  if (!shown.length) {
    list.innerHTML = `<div class="empty-state">
      <div class="ei">📋</div>
      <p>No tasks here. Hit <strong>Add New Task</strong> to get started.</p>
    </div>`;
    updateStats(); return;
  }

  shown.forEach(({subject,details,priority,done,i}) => {
    const pCls = priority==='high'?'p-high':priority==='low'?'p-low':'p-medium';
    const pLbl = priority==='high'?'🔴 High':priority==='low'?'🟢 Low':'⚡ Medium';

    const card = document.createElement('div');
    card.className = 'task-card' + (done?' done':'');

    card.innerHTML = `
      <div class="tc-top">
        <div class="tc-check ${done?'checked':''}" onclick="toggleDone(${i},event)"></div>
        <div class="tc-body">
          <div class="tc-subject">${esc(subject)}</div>
          ${details ? `<div class="tc-preview">${esc(details)}</div>` : ''}
          <div class="tc-meta">
            <span class="p-tag ${pCls}">${pLbl}</span>
          </div>
        </div>
        <div class="tc-actions">
          <button class="ic-btn edit" onclick="openEdit(${i},event)" title="Edit">✏️</button>
          <button class="ic-btn del"  onclick="deleteTask(${i},event)" title="Delete">🗑️</button>
        </div>
      </div>`;

    card.onclick = () => openView(i);
    list.appendChild(card);
  });

  updateStats();
}

/* ── Stats ──────────────────────────────────────────────────── */
function updateStats() {
  let total=0, done=0;
  Object.values(tasks).forEach(arr => arr.forEach(t => { total++; if(t.done) done++; }));
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sDone').textContent  = done;
  document.getElementById('sPend').textContent  = total-done;
}

/* ── Form Modal ─────────────────────────────────────────────── */
function openForm() {
  editIdx = null;
  document.getElementById('formTitle').textContent = 'New Task';
  document.getElementById('fSubject').value  = '';
  document.getElementById('fDetails').value  = '';
  document.getElementById('fPriority').value = 'medium';
  document.getElementById('fDate').value     = selectedDate;
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fSubject').focus(), 80);
}

function openEdit(i, e) {
  if(e) e.stopPropagation();
  const t = tasks[selectedDate][i];
  editIdx = i;
  document.getElementById('formTitle').textContent = 'Edit Task';
  document.getElementById('fSubject').value  = t.subject  || '';
  document.getElementById('fDetails').value  = t.details  || '';
  document.getElementById('fPriority').value = t.priority || 'medium';
  document.getElementById('fDate').value     = selectedDate;
  document.getElementById('formOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fSubject').focus(), 80);
}

function closeForm() { document.getElementById('formOverlay').classList.remove('open'); }

function saveTask() {
  const subject  = document.getElementById('fSubject').value.trim();
  const details  = document.getElementById('fDetails').value.trim();
  const priority = document.getElementById('fPriority').value;
  const date     = document.getElementById('fDate').value || selectedDate;

  if (!subject) {
    document.getElementById('fSubject').focus();
    showToast('⚠️ Subject is required.'); return;
  }

  if (!tasks[date]) tasks[date] = [];

  if (editIdx !== null && date === selectedDate) {
    tasks[selectedDate][editIdx] = { ...tasks[selectedDate][editIdx], subject, details, priority };
    showToast('✏️ Task updated.');
  } else {
    tasks[date].push({ subject, details, priority, done: false });
    // If date changed, update selectedDate
    selectedDate = date;
    showToast('✅ Task saved!');
  }

  save(); closeForm(); renderCalendar(); renderTasks();
}

/* ── View Modal ─────────────────────────────────────────────── */
function openView(i) {
  const t = tasks[selectedDate][i];
  viewDate = selectedDate; viewIdx = i;
  document.getElementById('vSubject').textContent  = t.subject  || '—';
  document.getElementById('vDetails').textContent  = t.details  || 'No details added.';
  const pLbl = t.priority==='high'?'🔴 High':t.priority==='low'?'🟢 Low':'⚡ Medium';
  document.getElementById('vPriority').textContent = pLbl;
  document.getElementById('vStatus').textContent   = t.done ? '✅ Completed' : '🕐 Pending';
  document.getElementById('viewOverlay').classList.add('open');
}

function closeView() { document.getElementById('viewOverlay').classList.remove('open'); }

function editFromView() { closeView(); openEdit(viewIdx, null); }

/* ── Task Actions ───────────────────────────────────────────── */
function toggleDone(i, e) {
  if(e) e.stopPropagation();
  tasks[selectedDate][i].done = !tasks[selectedDate][i].done;
  save(); renderTasks();
  if(tasks[selectedDate][i].done) showToast('🎉 Marked complete!');
}

function deleteTask(i, e) {
  if(e) e.stopPropagation();
  if(!confirm('Delete this task?')) return;
  tasks[selectedDate].splice(i,1);
  save(); renderCalendar(); renderTasks();
  showToast('🗑️ Deleted.');
}

function clearDay() {
  if(!(tasks[selectedDate]&&tasks[selectedDate].length)){showToast('Nothing to clear.');return;}
  if(!confirm('Clear ALL tasks for '+selectedDate+'?'))return;
  delete tasks[selectedDate];
  save(); renderCalendar(); renderTasks(); showToast('🗑️ Day cleared.');
}

/* ── Search (by Subject across all dates) ───────────────────── */
function handleSearch() {
  const q    = document.getElementById('searchInput').value.trim().toLowerCase();
  const drop = document.getElementById('searchDrop');

  if (!q) { drop.classList.remove('open'); drop.innerHTML=''; return; }

  const results = [];
  Object.entries(tasks).forEach(([date, arr]) => {
    arr.forEach((t, i) => {
      if (t.subject && t.subject.toLowerCase().includes(q)) {
        results.push({ date, i, task: t });
      }
    });
  });

  if (!results.length) {
    drop.innerHTML = `<div class="s-result" style="color:var(--muted);cursor:default">No tasks match "<strong>${esc(q)}</strong>"</div>`;
    drop.classList.add('open'); return;
  }

  drop.innerHTML = results.slice(0,12).map(({date,i,task}) => {
    const pLbl = task.priority==='high'?'🔴':task.priority==='low'?'🟢':'⚡';
    const dStr = new Date(date+'T00:00:00').toLocaleDateString('default',{month:'short',day:'numeric',year:'numeric'});
    const preview = task.details ? ' · ' + task.details.slice(0,40) + (task.details.length>40?'…':'') : '';
    return `<div class="s-result" onclick="jumpToTask('${date}',${i})">
      <div class="s-result-subj">${pLbl} ${esc(task.subject)}</div>
      <div class="s-result-meta">${dStr}${esc(preview)}</div>
    </div>`;
  }).join('');

  drop.classList.add('open');
}

function jumpToTask(date, i) {
  selectedDate = date;
  currentDate  = new Date(date+'T00:00:00');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchDrop').classList.remove('open');
  renderCalendar(); renderTasks();
  // Open detail view after short delay
  setTimeout(() => openView(i), 80);
}

// Close dropdown on outside click
document.addEventListener('click', e => {
  const drop = document.getElementById('searchDrop');
  if (!document.getElementById('searchInput').contains(e.target) && !drop.contains(e.target))
    drop.classList.remove('open');
});

// Overlay background click
function overlayClick(e, id) {
  if (e.target.id === id) {
    document.getElementById(id).classList.remove('open');
  }
}

/* ── Export / Import ────────────────────────────────────────── */
function exportTasks() {
  const b = new Blob([JSON.stringify(tasks,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'tasks-'+todayStr()+'.json'; a.click();
  showToast('💾 Exported!');
}
function importTasks(e) {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(typeof d !== 'object') throw 0;
      tasks = {...tasks,...d}; save();
      renderCalendar(); renderTasks(); showToast('📥 Imported!');
    } catch { showToast('❌ Invalid JSON.'); }
  };
  r.readAsText(f); e.target.value='';
}

/* ── Notifications ──────────────────────────────────────────── */
function requestNotif() {
  if(!('Notification' in window)){showToast('Browser not supported.');return;}
  Notification.requestPermission().then(p => {
    if(p==='granted'){
      const pending = (tasks[todayStr()]||[]).filter(t=>!t.done);
      if(!pending.length){showToast('No pending tasks today.');return;}
      new Notification("📅 Today's Tasks — "+pending.length+" pending",{
        body: pending.slice(0,3).map(t=>'• '+t.subject).join('\n'),
      });
      showToast('🔔 Notification sent!');
    } else showToast('Permission denied.');
  });
}

/* ── Theme ──────────────────────────────────────────────────── */
function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent = isDark?'🌙':'☀️';
  localStorage.setItem('tp_theme', isDark?'dark':'light');
}

/* ── Keyboard shortcuts ─────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if(e.key==='Escape'){
    document.getElementById('formOverlay').classList.remove('open');
    document.getElementById('viewOverlay').classList.remove('open');
    document.getElementById('searchDrop').classList.remove('open');
  }
  if((e.ctrlKey||e.metaKey) && e.key==='Enter'){
    if(document.getElementById('formOverlay').classList.contains('open')) saveTask();
  }
});

/* ── Boot ───────────────────────────────────────────────────── */
renderCalendar();
renderTasks();
</script>
</body>
</html>
