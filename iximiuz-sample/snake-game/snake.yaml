apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-game
  namespace: snake-game
spec:
  replicas: 3
  selector:
    matchLabels:
      app: snake-game
  template:
    metadata:
      labels:
        app: snake-game
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html
        configMap:
          name: snake-game-html
---
apiVersion: v1
kind: Service
metadata:
  name: snake-game
  namespace: snake-game
spec:
  type: NodePort
  selector:
    app: snake-game
  ports:
  - port: 80
    targetPort: 80
    nodePort: 32000
