      updateClock();

      // ── COUNT-UP ANIMATION ────────────────────
      function countUp(el, target, suffix, duration) {
        let start = 0, step = target / (duration / 16);
        const timer = setInterval(() => {
          start = Math.min(start + step, target);
          el.textContent = Math.round(start) + (suffix||'');
          if (start >= target) clearInterval(timer);
        }, 16);
      }

      setTimeout(() => {
        countUp(document.getElementById('counter-races'), 24, '',   1200);
        countUp(document.getElementById('counter-teams'), 10, '',   900);
        countUp(document.getElementById('counter-laps'),  57, '',   1000);
        countUp(document.getElementById('counter-speed'), 372,'',  1400);
      }, 800);

      // ── DRIVER CARDS ─────────────────────────
      const grid = document.getElementById('driversGrid');
      DRIVERS.forEach(d => {
        const pct = Math.round((d.pts / d.max) * 100);
        const card = document.createElement('div');
        card.className = 'driver-card';
        card.style.setProperty('--tc', d.tc);
        card.innerHTML = `
          <div class="ghost-num">${d.num}</div>
          <div class="driver-team">${d.team}</div>
          <div class="driver-name">${d.name}</div>
          <div class="driver-nat">${d.nat}</div>
          <div class="driver-bar"><div class="driver-bar-fill" data-w="${pct}%"></div></div>
          <div class="driver-pts">
            <span class="num">${d.pts}</span>
            <span class="label">pts</span>
          </div>`;
        grid.appendChild(card);
      });

      // ── GALLERY ───────────────────────────────
      const track = document.getElementById('galleryTrack');
      const dotsEl = document.getElementById('galleryDots');
      let current = 0;

      CARS.forEach((car, i) => {
        const slide = document.createElement('div');
        slide.className = 'gallery-slide';
        slide.innerHTML = `
          <svg class="car-svg" viewBox="0 0 560 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            ${car.path}
          </svg>
          <div class="car-meta">
            <div class="team-name" style="color:${car.color}">${car.team}</div>
            <div class="car-detail">${car.detail}</div>
          </div>`;
        track.appendChild(slide);

        const dot = document.createElement('button');
        dot.className = 'gallery-dot' + (i===0?' active':'');
        dot.setAttribute('aria-label','Slide '+(i+1));
        dot.addEventListener('click', () => goTo(i));
        dotsEl.appendChild(dot);
      });

      function goTo(idx) {
        current = (idx + CARS.length) % CARS.length;
        track.style.transform = `translateX(-${current * 100}%)`;
        document.querySelectorAll('.gallery-dot').forEach((d,i) =>
          d.classList.toggle('active', i === current));
      }

      document.getElementById('galleryPrev').addEventListener('click', () => goTo(current - 1));
      document.getElementById('galleryNext').addEventListener('click', () => goTo(current + 1));
      setInterval(() => goTo(current + 1), 4000);

      // ── STANDINGS TABLE ───────────────────────
      const tbody = document.getElementById('standingsBody');
      STANDINGS.forEach(s => {
        const pct = Math.round((s.pts / 429) * 100);
        const pc  = s.pos <= 3 ? `pos-${s.pos}` : 'pos-rest';
        const tr  = document.createElement('tr');
        tr.innerHTML = `
          <td><span class="pos-badge ${pc}">${s.pos}</span></td>
          <td>
            <span class="team-color-bar" style="background:${s.tc}"></span>
            <span class="driver-nm">${s.name}</span>
            <div class="driver-nm-sub" style="margin-left:1.5rem">${s.team}</div>
          </td>
          <td class="pts-cell">${s.pts}</td>
          <td class="gap-cell hide-sm">${s.gap}</td>
          <td class="hide-sm">
            <div class="pts-bar-wrap">
              <div class="pts-bar" data-w="${pct}%" style="background:${s.tc}"></div>
            </div>
          </td>`;
        tbody.appendChild(tr);
      });

      // ── CALENDAR ─────────────────────────────
      const calGrid = document.getElementById('calendarGrid');
      RACES.forEach(r => {
        const card = document.createElement('div');
        card.className = 'race-card' + (r.upcoming?' upcoming':'') + (r.done?' done':'');
        card.innerHTML = `
          <div class="race-round">
            <div class="round-label">Rd</div>
            <div class="round-num">${r.r}</div>
          </div>
          <div class="race-info">
            <div class="race-flag">${r.flag}</div>
            <div class="race-name">${r.name}</div>
            <div class="race-circuit">${r.circuit}</div>
            <div class="race-date">${r.date}</div>
          </div>`;
        calGrid.appendChild(card);
      });

      // ── RPM GAUGE ────────────────────────────
      const svg = document.getElementById('rpmGauge');
      const R = 80, cx2 = 100, cy2 = 100;
      const startA = Math.PI * 0.75, endA = Math.PI * 2.25;

      function polarXY(angle, r) {
        return [cx2 + r * Math.cos(angle), cy2 + r * Math.sin(angle)];
      }
      function arcPath(sa, ea, r) {
        const [sx, sy] = polarXY(sa, r);
        const [ex, ey] = polarXY(ea, r);
        const large = (ea - sa > Math.PI) ? 1 : 0;
        return `M ${sx} ${sy} A ${r} ${r} 0 ${large} 1 ${ex} ${ey}`;
      }

      // background arc
      const bgArc = document.createElementNS('http://www.w3.org/2000/svg','path');
      bgArc.setAttribute('d', arcPath(startA, endA, R));
      bgArc.setAttribute('stroke','#222');
      bgArc.setAttribute('stroke-width','10');
      bgArc.setAttribute('fill','none');
      bgArc.setAttribute('stroke-linecap','round');
      svg.appendChild(bgArc);

      // fill arc
      const fillArc = document.createElementNS('http://www.w3.org/2000/svg','path');
      fillArc.setAttribute('d', arcPath(startA, startA + 0.001, R));
      fillArc.setAttribute('stroke','#E10600');
      fillArc.setAttribute('stroke-width','10');
      fillArc.setAttribute('fill','none');
      fillArc.setAttribute('stroke-linecap','round');
      svg.appendChild(fillArc);

      // needle
      const needle = document.createElementNS('http://www.w3.org/2000/svg','line');
      needle.setAttribute('x1', cx2); needle.setAttribute('y1', cy2);
      needle.setAttribute('stroke','#FFD700');
      needle.setAttribute('stroke-width','2.5');
      needle.setAttribute('stroke-linecap','round');
      svg.appendChild(needle);

      // center dot
      const cdot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      cdot.setAttribute('cx', cx2); cdot.setAttribute('cy', cy2);
      cdot.setAttribute('r','5'); cdot.setAttribute('fill','#E10600');
      svg.appendChild(cdot);

      // rpm label
      const rpmLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
      rpmLabel.setAttribute('x', cx2); rpmLabel.setAttribute('y', cy2 + 25);
      rpmLabel.setAttribute('text-anchor','middle');
      rpmLabel.setAttribute('fill','#fff');
      rpmLabel.setAttribute('font-family','Share Tech Mono, monospace');
      rpmLabel.setAttribute('font-size','13');
      svg.appendChild(rpmLabel);

      const maxLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
      maxLabel.setAttribute('x', cx2); maxLabel.setAttribute('y', cy2 + 40);
      maxLabel.setAttribute('text-anchor','middle');
      maxLabel.setAttribute('fill','#555');
      maxLabel.setAttribute('font-family','Share Tech Mono, monospace');
      maxLabel.setAttribute('font-size','9');
      maxLabel.textContent = '/ 18,000 RPM';
      svg.appendChild(maxLabel);

      let rpm = 0, targetRpm = 0;
      const gearMap = [null,'1st','2nd','3rd','4th','5th','6th','7th','8th'];

      function updateTelemetry() {
        targetRpm = 6000 + Math.sin(Date.now() / 1200) * 5500 + Math.random() * 1800;
        targetRpm = Math.max(5000, Math.min(18000, targetRpm));
      }

      function animTelemetry() {
        rpm += (targetRpm - rpm) * 0.06;
        const t = (rpm - 0) / 18000;
        const angle = startA + t * (endA - startA);
        fillArc.setAttribute('d', arcPath(startA, angle, R));
        const [nx, ny] = polarXY(angle, R - 14);
        needle.setAttribute('x2', nx); needle.setAttribute('y2', ny);
        rpmLabel.textContent = Math.round(rpm / 100) * 100 + '';

        const speed = Math.round(rpm * 0.018 + 40);
        const gear  = Math.min(8, Math.max(1, Math.round(rpm / 2400)));
        const thr   = Math.round(60 + Math.sin(Date.now()/900) * 38);
        const temp  = Math.round(85 + Math.sin(Date.now()/2000) * 15);

        document.getElementById('tel-speed').innerHTML   = speed + ' <span>km/h</span>';
        document.getElementById('tel-gear').textContent  = gearMap[gear];
        document.getElementById('tel-throttle').innerHTML= thr + ' <span>%</span>';
        document.getElementById('tel-temp').innerHTML    = temp + ' <span>°C</span>';

        // colour RPM arc: green → yellow → red
        const hue = rpm < 12000 ? `hsl(${120 - rpm/200},90%,45%)` : '#E10600';
        fillArc.setAttribute('stroke', hue);

        requestAnimationFrame(animTelemetry);
      }

      setInterval(updateTelemetry, 900);
      updateTelemetry();
      animTelemetry();

      // ── SCROLL REVEAL ─────────────────────────
      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            // animate bar fills
            e.target.querySelectorAll('[data-w]').forEach(bar => {
              setTimeout(() => { bar.style.width = bar.dataset.w; }, 200);
            });
            observer.unobserve(e.target);
          }
        });
      }, { threshold: 0.12 });

      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

      // also animate driver bar fills when page loads (hero visible)
      setTimeout(() => {
        document.querySelectorAll('.driver-bar-fill').forEach(b => {
          b.style.width = b.dataset.w;
        });
        document.querySelectorAll('.pts-bar').forEach(b => {
          b.style.width = b.dataset.w;
        });
      }, 400);
      </script>
    </body>
    </html>

---
# ──────────────────────────────────────────────
#  Deployment
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-f1
  labels:
    app: nginx-f1
    env: development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-f1
  template:
    metadata:
      labels:
        app: nginx-f1
        env: development
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html          # mount only the file, not the entire dir
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: html-volume
          configMap:
            name: nginx-html-config    # references the ConfigMap above

---
# ──────────────────────────────────────────────
#  Service  (ClusterIP — expose via Ingress or NodePort as needed)
# ──────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: nginx-f1-svc
  labels:
    app: nginx-f1
spec:
  selector:
    app: nginx-f1
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 32222
  type: NodePort
