---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html-config
  namespace: dev
  labels:
    app: nginx-f1
    env: development
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>F1 Championship — 2024</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,700;0,900;1,900&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
      <style>
        /* ═══════════════════════════════════════
           TOKENS
        ═══════════════════════════════════════ */
        :root {
          --red:      #E10600;
          --red-glow: rgba(225,6,0,.35);
          --dark:     #0a0a0f;
          --panel:    #111118;
          --card:     #16161f;
          --border:   rgba(255,255,255,.07);
          --gold:     #FFD700;
          --silver:   #b8c4d0;
          --text:     #f0f0f5;
          --muted:    #6b7280;
          --mono:     'Share Tech Mono', monospace;
          --head:     'Barlow Condensed', sans-serif;
          --body:     'Barlow', sans-serif;
        }

        /* ═══════════════════════════════════════
           RESET & BASE
        ═══════════════════════════════════════ */
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        html { scroll-behavior: smooth; }

        body {
          background: var(--dark);
          color: var(--text);
          font-family: var(--body);
          font-size: 16px;
          line-height: 1.6;
          overflow-x: hidden;
          cursor: none;
        }

        /* ═══════════════════════════════════════
           CUSTOM CURSOR
        ═══════════════════════════════════════ */
        #cursor-dot {
          position: fixed;
          width: 8px; height: 8px;
          background: var(--red);
          border-radius: 50%;
          pointer-events: none;
          z-index: 99999;
          transform: translate(-50%,-50%);
          transition: transform .1s;
        }
        #cursor-ring {
          position: fixed;
          width: 32px; height: 32px;
          border: 1.5px solid rgba(225,6,0,.6);
          border-radius: 50%;
          pointer-events: none;
          z-index: 99998;
          transform: translate(-50%,-50%);
          transition: all .12s ease;
        }
        body.hovering #cursor-ring {
          width: 48px; height: 48px;
          border-color: var(--gold);
        }

        /* ═══════════════════════════════════════
           SCAN-LINE OVERLAY
        ═══════════════════════════════════════ */
        body::after {
          content: '';
          position: fixed; inset: 0;
          background: repeating-linear-gradient(
            0deg,
            transparent,
            transparent 2px,
            rgba(0,0,0,.06) 2px,
            rgba(0,0,0,.06) 4px
          );
          pointer-events: none;
          z-index: 9000;
        }

        /* ═══════════════════════════════════════
           NOISE GRAIN
        ═══════════════════════════════════════ */
        #grain {
          position: fixed; inset: 0;
          pointer-events: none;
          z-index: 8999;
          opacity: .025;
          background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
          background-size: 256px;
        }

        /* ═══════════════════════════════════════
           TOP NAV
        ═══════════════════════════════════════ */
        nav {
          position: fixed; top: 0; left: 0; right: 0;
          height: 56px;
          background: rgba(10,10,15,.85);
          backdrop-filter: blur(16px);
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 2.5rem;
          z-index: 1000;
        }

        .nav-logo {
          font-family: var(--head);
          font-size: 1.7rem;
          font-weight: 900;
          font-style: italic;
          letter-spacing: -1px;
          color: var(--text);
          text-decoration: none;
        }
        .nav-logo em { color: var(--red); font-style: normal; }

        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a {
          font-family: var(--head);
          font-size: .85rem;
          font-weight: 700;
          letter-spacing: .12em;
          text-transform: uppercase;
          color: var(--muted);
          text-decoration: none;
          transition: color .2s;
          position: relative;
        }
        .nav-links a::after {
          content: '';
          position: absolute; bottom: -4px; left: 0; right: 0;
          height: 2px; background: var(--red);
          transform: scaleX(0); transition: transform .2s;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-links a:hover::after { transform: scaleX(1); }

        .nav-live {
          display: flex; align-items: center; gap: .5rem;
          font-family: var(--mono);
          font-size: .75rem;
          color: var(--red);
        }
        .live-dot {
          width: 7px; height: 7px;
          background: var(--red);
          border-radius: 50%;
          animation: pulse 1.4s infinite;
        }
        @keyframes pulse {
          0%,100% { opacity: 1; box-shadow: 0 0 0 0 var(--red-glow); }
          50%      { opacity: .6; box-shadow: 0 0 0 6px transparent; }
        }

        /* ═══════════════════════════════════════
           HERO
        ═══════════════════════════════════════ */
        .hero {
          min-height: 100vh;
          display: flex; flex-direction: column;
          justify-content: center; align-items: center;
          text-align: center;
          position: relative;
          overflow: hidden;
          padding: 80px 2rem 4rem;
        }

        /* speed-line background */
        .hero-lines {
          position: absolute; inset: 0;
          background: repeating-linear-gradient(
            88deg,
            transparent,
            transparent 60px,
            rgba(225,6,0,.025) 60px,
            rgba(225,6,0,.025) 61px
          );
          animation: speed-lines 3s linear infinite;
        }
        @keyframes speed-lines {
          from { background-position: 0 0; }
          to   { background-position: 120px 0; }
        }

        /* red bottom bar accent */
        .hero::before {
          content: '';
          position: absolute; bottom: 0; left: 0; right: 0;
          height: 3px;
          background: linear-gradient(90deg, transparent, var(--red), transparent);
        }

        .hero-kicker {
          font-family: var(--mono);
          font-size: .78rem;
          letter-spacing: .2em;
          color: var(--red);
          text-transform: uppercase;
          margin-bottom: 1.5rem;
          opacity: 0;
          animation: fadeUp .6s .2s forwards;
        }

        .hero-title {
          font-family: var(--head);
          font-size: clamp(4rem, 14vw, 11rem);
          font-weight: 900;
          font-style: italic;
          line-height: .9;
          letter-spacing: -3px;
          text-transform: uppercase;
          opacity: 0;
          animation: fadeUp .7s .35s forwards;
        }
        .hero-title .outline {
          -webkit-text-stroke: 2px var(--text);
          color: transparent;
        }
        .hero-title .red { color: var(--red); }

        .hero-sub {
          font-family: var(--head);
          font-size: clamp(1rem, 2.5vw, 1.4rem);
          font-weight: 300;
          letter-spacing: .15em;
          text-transform: uppercase;
          color: var(--silver);
          margin-top: 1.5rem;
          opacity: 0;
          animation: fadeUp .7s .5s forwards;
        }

        /* F1 car SVG illustration (inline, ultra-simplified side-view silhouette) */
        .hero-car {
          width: min(600px, 90vw);
          margin-top: 3rem;
          opacity: 0;
          animation: carSlide 1s .65s cubic-bezier(.16,1,.3,1) forwards;
          filter: drop-shadow(0 0 40px var(--red-glow));
          position: relative;
          z-index: 2;
        }
        @keyframes carSlide {
          from { opacity:0; transform: translateX(-80px) scale(.95); }
          to   { opacity:1; transform: translateX(0) scale(1); }
        }

        /* stats strip under car */
        .hero-stats {
          display: flex; gap: 3rem;
          margin-top: 3rem;
          opacity: 0;
          animation: fadeUp .7s .9s forwards;
        }
        .stat-item { text-align: center; }
        .stat-num {
          font-family: var(--head);
          font-size: 2.5rem;
          font-weight: 900;
          font-style: italic;
          color: var(--red);
          line-height: 1;
        }
        .stat-label {
          font-family: var(--mono);
          font-size: .65rem;
          letter-spacing: .15em;
          color: var(--muted);
          text-transform: uppercase;
          margin-top: .3rem;
        }

        /* ── shared animations ── */
        @keyframes fadeUp {
          from { opacity:0; transform: translateY(20px); }
          to   { opacity:1; transform: translateY(0); }
        }

        /* ═══════════════════════════════════════
           SECTION LAYOUT
        ═══════════════════════════════════════ */
        .section {
          max-width: 1200px;
          margin: 0 auto;
          padding: 5rem 2rem;
        }

        .section-head {
          display: flex; align-items: baseline; gap: 1rem;
          margin-bottom: 2.5rem;
        }
        .section-num {
          font-family: var(--mono);
          font-size: .7rem;
          color: var(--red);
          letter-spacing: .1em;
        }
        .section-title {
          font-family: var(--head);
          font-size: 2.2rem;
          font-weight: 900;
          font-style: italic;
          text-transform: uppercase;
          letter-spacing: -1px;
          position: relative;
        }
        .section-title::after {
          content: '';
          display: block;
          height: 3px;
          width: 48px;
          background: var(--red);
          margin-top: .4rem;
        }

        /* ═══════════════════════════════════════
           RACE TICKER
        ═══════════════════════════════════════ */
        .ticker-wrap {
          background: var(--red);
          padding: .6rem 0;
          overflow: hidden;
          white-space: nowrap;
        }
        .ticker-inner {
          display: inline-block;
          animation: ticker 25s linear infinite;
        }
        .ticker-inner:hover { animation-play-state: paused; }
        @keyframes ticker {
          from { transform: translateX(0); }
          to   { transform: translateX(-50%); }
        }
        .ticker-item {
          display: inline-flex; align-items: center; gap: .5rem;
          font-family: var(--head);
          font-size: .8rem;
          font-weight: 700;
          letter-spacing: .1em;
          text-transform: uppercase;
          padding: 0 2.5rem;
          color: #fff;
        }
        .ticker-sep { color: rgba(255,255,255,.4); }

        /* ═══════════════════════════════════════
           DRIVER CARDS
        ═══════════════════════════════════════ */
        .drivers-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
          gap: 1.25rem;
        }

        .driver-card {
          background: var(--card);
          border: 1px solid var(--border);
          border-top: 3px solid var(--tc, var(--red));
          border-radius: 8px;
          padding: 1.75rem 1.5rem;
          position: relative;
          overflow: hidden;
          transition: transform .25s, box-shadow .25s;
          cursor: pointer;
        }
        .driver-card:hover {
          transform: translateY(-6px);
          box-shadow: 0 20px 60px rgba(0,0,0,.6), 0 0 0 1px var(--tc, var(--red));
        }

        /* card glow on hover */
        .driver-card::before {
          content: '';
          position: absolute; inset: 0;
          background: radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,255,255,.04), transparent 70%);
          pointer-events: none;
        }

        /* big ghost number */
        .driver-card .ghost-num {
          position: absolute;
          right: -8px; top: -12px;
          font-family: var(--head);
          font-size: 7rem;
          font-weight: 900;
          font-style: italic;
          line-height: 1;
          color: var(--tc, var(--red));
          opacity: .07;
          user-select: none;
          pointer-events: none;
        }

        .driver-team {
          font-family: var(--mono);
          font-size: .65rem;
          letter-spacing: .15em;
          color: var(--tc, var(--red));
          text-transform: uppercase;
          margin-bottom: .5rem;
        }
        .driver-name {
          font-family: var(--head);
          font-size: 1.45rem;
          font-weight: 900;
          font-style: italic;
          text-transform: uppercase;
          line-height: 1.1;
        }
        .driver-nat {
          font-size: .8rem;
          color: var(--muted);
          margin-top: .3rem;
        }

        .driver-bar {
          height: 2px;
          background: var(--border);
          border-radius: 1px;
          margin: 1.25rem 0;
          overflow: hidden;
        }
        .driver-bar-fill {
          height: 100%;
          background: var(--tc, var(--red));
          border-radius: 1px;
          width: 0;
          transition: width 1.2s cubic-bezier(.16,1,.3,1);
        }

        .driver-pts {
          display: flex; align-items: baseline; gap: .4rem;
        }
        .driver-pts .num {
          font-family: var(--head);
          font-size: 2.2rem;
          font-weight: 900;
          font-style: italic;
          color: var(--gold);
          line-height: 1;
        }
        .driver-pts .label {
          font-family: var(--mono);
          font-size: .65rem;
          color: var(--muted);
          letter-spacing: .1em;
          text-transform: uppercase;
        }

        /* ═══════════════════════════════════════
           CAR GALLERY (CSS-only carousel)
        ═══════════════════════════════════════ */
        .gallery-wrap {
          position: relative;
          overflow: hidden;
          border-radius: 10px;
          background: var(--panel);
          border: 1px solid var(--border);
        }

        .gallery-track {
          display: flex;
          transition: transform .6s cubic-bezier(.16,1,.3,1);
        }

        .gallery-slide {
          min-width: 100%;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 3rem 2rem;
          gap: 2rem;
        }

        /* Inline SVG car illustrations per team */
        .car-svg { width: min(520px, 80vw); }

        .car-meta {
          text-align: center;
        }
        .car-meta .team-name {
          font-family: var(--head);
          font-size: 2rem;
          font-weight: 900;
          font-style: italic;
          text-transform: uppercase;
          letter-spacing: -1px;
        }
        .car-meta .car-detail {
          font-family: var(--mono);
          font-size: .75rem;
          color: var(--muted);
          letter-spacing: .12em;
          margin-top: .5rem;
        }

        .gallery-dots {
          display: flex; justify-content: center; gap: .6rem;
          padding: 1.25rem;
          background: var(--panel);
          border-top: 1px solid var(--border);
        }
        .gallery-dot {
          width: 28px; height: 4px;
          border-radius: 2px;
          background: var(--border);
          cursor: pointer;
          transition: background .25s, width .25s;
          border: none;
        }
        .gallery-dot.active {
          background: var(--red);
          width: 40px;
        }

        .gallery-btn {
          position: absolute; top: 50%; transform: translateY(-50%);
          width: 40px; height: 40px;
          background: rgba(10,10,15,.8);
          border: 1px solid var(--border);
          border-radius: 50%;
          color: var(--text);
          cursor: pointer;
          display: flex; align-items: center; justify-content: center;
          font-size: 1.2rem;
          transition: background .2s, border-color .2s;
          z-index: 10;
        }
        .gallery-btn:hover { background: var(--red); border-color: var(--red); }
        .gallery-btn.prev { left: 1rem; }
        .gallery-btn.next { right: 1rem; }

        /* ═══════════════════════════════════════
           STANDINGS TABLE
        ═══════════════════════════════════════ */
        .standings-wrap {
          background: var(--panel);
          border: 1px solid var(--border);
          border-radius: 10px;
          overflow: hidden;
        }

        .standings-table {
          width: 100%;
          border-collapse: collapse;
        }

        .standings-table thead tr {
          background: rgba(225,6,0,.08);
        }
        .standings-table th {
          padding: .8rem 1.25rem;
          font-family: var(--mono);
          font-size: .65rem;
          letter-spacing: .15em;
          text-transform: uppercase;
          color: var(--muted);
          text-align: left;
          border-bottom: 1px solid var(--border);
        }

        .standings-table td {
          padding: 1rem 1.25rem;
          border-bottom: 1px solid rgba(255,255,255,.04);
          vertical-align: middle;
        }

        .standings-table tr:last-child td { border-bottom: none; }

        .standings-table tbody tr {
          transition: background .15s;
          cursor: pointer;
        }
        .standings-table tbody tr:hover { background: rgba(255,255,255,.03); }

        .pos-badge {
          font-family: var(--head);
          font-size: 1.3rem;
          font-weight: 900;
          font-style: italic;
          width: 36px;
          display: inline-block;
          text-align: center;
        }
        .pos-1 { color: var(--gold); }
        .pos-2 { color: var(--silver); }
        .pos-3 { color: #cd7f32; }
        .pos-rest { color: var(--muted); }

        .team-color-bar {
          display: inline-block;
          width: 4px; height: 22px;
          border-radius: 2px;
          vertical-align: middle;
          margin-right: .75rem;
        }

        .driver-nm {
          font-family: var(--head);
          font-size: 1.05rem;
          font-weight: 700;
          font-style: italic;
          text-transform: uppercase;
          letter-spacing: -.3px;
        }
        .driver-nm-sub {
          font-size: .75rem;
          color: var(--muted);
          font-family: var(--mono);
        }

        .pts-cell {
          font-family: var(--head);
          font-size: 1.2rem;
          font-weight: 900;
          font-style: italic;
          color: var(--gold);
        }

        .pts-bar-wrap {
          width: 100px;
          height: 4px;
          background: var(--border);
          border-radius: 2px;
          overflow: hidden;
          display: inline-block;
          vertical-align: middle;
          margin-left: .75rem;
        }
        .pts-bar {
          height: 100%;
          border-radius: 2px;
          width: 0;
          transition: width 1.4s cubic-bezier(.16,1,.3,1);
        }

        .gap-cell {
          font-family: var(--mono);
          font-size: .8rem;
          color: var(--muted);
        }

        /* ═══════════════════════════════════════
           RACE CALENDAR
        ═══════════════════════════════════════ */
        .calendar-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
          gap: 1rem;
        }

        .race-card {
          background: var(--card);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 1.5rem;
          display: grid;
          grid-template-columns: 56px 1fr;
          gap: 1rem;
          align-items: start;
          transition: border-color .2s, transform .2s;
          position: relative;
          overflow: hidden;
          cursor: pointer;
        }
        .race-card:hover {
          border-color: rgba(225,6,0,.4);
          transform: translateY(-3px);
        }
        .race-card.upcoming::after {
          content: 'NEXT';
          position: absolute; top: .75rem; right: .75rem;
          font-family: var(--mono);
          font-size: .6rem;
          letter-spacing: .12em;
          background: var(--red);
          color: #fff;
          padding: .15rem .5rem;
          border-radius: 3px;
        }
        .race-card.done { opacity: .55; }

        .race-round {
          background: rgba(225,6,0,.12);
          border: 1px solid rgba(225,6,0,.25);
          border-radius: 6px;
          display: flex; flex-direction: column;
          align-items: center; justify-content: center;
          padding: .5rem;
          text-align: center;
        }
        .round-label {
          font-family: var(--mono);
          font-size: .55rem;
          letter-spacing: .1em;
          color: var(--red);
          text-transform: uppercase;
        }
        .round-num {
          font-family: var(--head);
          font-size: 1.5rem;
          font-weight: 900;
          font-style: italic;
          color: var(--red);
          line-height: 1;
        }

        .race-info { }
        .race-flag {
          font-size: 1.3rem;
          line-height: 1;
          margin-bottom: .3rem;
        }
        .race-name {
          font-family: var(--head);
          font-size: 1.05rem;
          font-weight: 700;
          font-style: italic;
          text-transform: uppercase;
          letter-spacing: -.3px;
          line-height: 1.1;
        }
        .race-circuit {
          font-size: .78rem;
          color: var(--muted);
          margin-top: .25rem;
          font-family: var(--mono);
        }
        .race-date {
          display: inline-block;
          margin-top: .6rem;
          font-family: var(--mono);
          font-size: .7rem;
          color: var(--red);
          letter-spacing: .08em;
          border-top: 1px solid rgba(225,6,0,.2);
          padding-top: .4rem;
        }

        /* ═══════════════════════════════════════
           TELEMETRY WIDGET
        ═══════════════════════════════════════ */
        .telemetry {
          background: var(--panel);
          border: 1px solid var(--border);
          border-radius: 10px;
          padding: 2rem;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 2rem;
        }

        @media (max-width: 640px) {
          .telemetry { grid-template-columns: 1fr; }
        }

        .tele-gauge {
          text-align: center;
        }
        .gauge-label {
          font-family: var(--mono);
          font-size: .7rem;
          letter-spacing: .15em;
          text-transform: uppercase;
          color: var(--muted);
          margin-bottom: 1rem;
        }

        /* SVG gauge drawn via JS */
        .gauge-svg { display: block; margin: 0 auto; }

        .tele-readout {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 1rem;
        }
        .readout-item {
          background: rgba(255,255,255,.03);
          border: 1px solid var(--border);
          border-radius: 6px;
          padding: 1rem;
        }
        .readout-label {
          font-family: var(--mono);
          font-size: .62rem;
          letter-spacing: .12em;
          color: var(--muted);
          text-transform: uppercase;
        }
        .readout-value {
          font-family: var(--head);
          font-size: 1.8rem;
          font-weight: 900;
          font-style: italic;
          color: var(--text);
          line-height: 1;
