        /* ═══════════════════════════════════════
           SCROLL REVEAL
        ═══════════════════════════════════════ */
        .reveal {
          opacity: 0;
          transform: translateY(30px);
          transition: opacity .7s, transform .7s cubic-bezier(.16,1,.3,1);
        }
        .reveal.visible {
          opacity: 1;
          transform: none;
        }

        /* ═══════════════════════════════════════
