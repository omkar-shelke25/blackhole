apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: prod
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      nodeSelector:
        kubernetes.io/hostname: node-01
      tolerations:
      - key: environment
        operator: Equal
        value: production
        effect: NoSchedule
      volumes:
      - name: web-content
        configMap:
          name: web-content
      containers:
      - name: nginx
        image: public.ecr.aws/nginx/nginx:stable
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-content
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-nodeport
  namespace: prod
spec:
  type: NodePort
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30333
