apiVersion: v1
kind: ConfigMap
metadata:
  name: flask-app-code
  namespace: logger
  labels:
    app: request-logger
data:
  requirements.txt: |
    flask==3.0.3

  app.py: |
    from flask import Flask, request
    import logging
    import datetime
    import sys
    import os

    app = Flask(__name__)

    # ── Formatter ────────────────────────────────────────────────
    class PlainFormatter(logging.Formatter):
        def format(self, record):
            ts = datetime.datetime.utcnow().strftime("%H:%M:%S.%f")[:-3]
            return "{ts}  {level:<8}  {msg}".format(
                ts=ts, level=record.levelname, msg=record.getMessage())

    handler = logging.StreamHandler(sys.stdout)
    handler.setFormatter(PlainFormatter())
    logger = logging.getLogger("rl")
    logger.setLevel(logging.DEBUG)
    logger.addHandler(handler)
    logger.propagate = False

    # ── Tool detection ────────────────────────────────────────────
    TOOL_LABELS = {
        "curl":            "CURL",
        "wget":            "WGET",
        "python-requests": "PYTHON-REQUESTS",
        "httpie":          "HTTPIE",
        "browser/other":   "BROWSER",
    }
    TOOL_EMOJI = {
        "curl":            "⚡",
        "wget":            "🌐",
        "python-requests": "🐍",
        "httpie":          "🔥",
        "browser/other":   "🌍",
    }

    def detect_tool(ua):
        u = ua.lower()
        if "curl"   in u: return "curl"
        if "wget"   in u: return "wget"
        if "python" in u: return "python-requests"
        if "httpie" in u: return "httpie"
        return "browser/other"

    # ── Box builder ───────────────────────────────────────────────
    # W = total inner width (between the | pipes)
    W   = 72
    KW  = 12   # key column width
    # value column = W - KW - 4  (for "| " + ": " + " |")
    VW  = W - KW - 4

    def row(key, value):
        # truncate value if still too long
        v = str(value)
        if len(v) > VW:
            v = v[:VW - 3] + "..."
        return "| " + key.ljust(KW) + ": " + v.ljust(VW) + " |"

    def hline(ch="-"):
        return "+" + ch * (W + 2) + "+"

    def request_box(tool, method, path, ip, ua, ts, body=None):
        emoji = TOOL_EMOJI.get(tool, "?")
        label = TOOL_LABELS.get(tool, tool.upper())
        title = "  INCOMING REQUEST   " + emoji + " " + label

        lines = [
            "",
            hline("="),
            "| " + title.ljust(W) + "  |",
            hline("-"),
            row("timestamp",  ts),
            row("method",     method),
            row("path",       path),
            row("client ip",  ip),
            row("user-agent", ua),
        ]
        if body:
            lines.append(row("body", body))
        lines += [hline("="), ""]
        return "\n".join(lines)

    def response_box(tool, method, full_path, ip, svc_name, now):
        emoji = TOOL_EMOJI.get(tool, "?")
        label = TOOL_LABELS.get(tool, tool.upper())
        title = "  REQUEST LOGGER  |  " + emoji + " " + label

        lines = [
            hline("="),
            "| " + title.ljust(W) + "  |",
            hline("="),
            row("sender ip",  ip),
            row("method",     method),
            row("path",       full_path),
            row("receiver",   svc_name),
            row("timestamp",  now),
            hline("="),
        ]
        return "\n".join(lines) + "\n"

    def summary_line(tool, method, path, ip, svc, code):
        emoji = TOOL_EMOJI.get(tool, "?")
        label = TOOL_LABELS.get(tool, tool.upper())
        return (
            "  >> " + emoji + " " + label
            + "  " + method.ljust(7)
            + "  " + path
            + "  from " + ip
            + "  ->  " + svc
            + "  HTTP " + str(code)
        )

    # ── Routes ────────────────────────────────────────────────────
    @app.route("/", defaults={"path": ""}, methods=["GET","POST","PUT","DELETE","PATCH"])
    @app.route("/<path:path>",             methods=["GET","POST","PUT","DELETE","PATCH"])
    def catch_all(path):
        now       = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%f")[:-3] + "Z"
        ua        = request.headers.get("User-Agent", "unknown")
        tool      = detect_tool(ua)
        ip        = request.headers.get("X-Forwarded-For", request.remote_addr)
        full_path = "/" + path if path else "/"
        body      = request.get_data(as_text=True) or None
        pod_name  = os.getenv("POD_NAME",     "request-logger")
        pod_ns    = os.getenv("POD_NAMESPACE", "logger")
        svc_name  = "request-logger-svc." + pod_ns + ".svc.cluster.local"

        # request box in logs
        box = request_box(tool, request.method, full_path, ip, ua, now, body)
        if tool in ("curl", "wget"):
            logger.warning(box)
        else:
            logger.info(box)

        # receiver + summary in logs
        logger.info(
            "  RECEIVER  pod=" + pod_name
            + "  ns=" + pod_ns
            + "  svc=" + svc_name
        )
        logger.debug("  Headers:")
        for k, v in request.headers:
            logger.debug("    " + k + ": " + v)
        logger.info(summary_line(tool, request.method, full_path, ip, svc_name, 200))
        logger.info("")

        # curl-readable response body
        resp = response_box(tool, request.method, full_path, ip, svc_name, now)
        return resp, 200, {"Content-Type": "text/plain"}

    @app.route("/health")
    def health():
        logger.debug("health check OK")
        return "OK", 200

    if __name__ == "__main__":
        pod = os.getenv("POD_NAME",      "request-logger")
        ns  = os.getenv("POD_NAMESPACE", "logger")
        logger.info("")
        logger.info("  " + "+" + "=" * 54 + "+")
        logger.info("  | " + "REQUEST LOGGER POD  --  STARTED".ljust(53) + "|")
        logger.info("  | " + ("pod=" + pod + "  ns=" + ns).ljust(53) + "|")
        logger.info("  | " + "listening on 0.0.0.0:5000".ljust(53) + "|")
        logger.info("  " + "+" + "=" * 54 + "+")
        logger.info("")
        app.run(host="0.0.0.0", port=5000)
