# ============================================================
#  ConfigMap — V1
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: httpd-v1-config
data:
  index.html: |
    🔵 Hello from Version 1 ! 🚀
    ✅ App    : httpd:alpine
    📦 Version: v1 (Stable)
    ⚙️  Replicas: 2
    🌐 Service : svc-v1

---
# ============================================================
#  ConfigMap — V2
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: httpd-v2-config
data:
  index.html: |
    🟣 Hello from Version 2 ! ✨
    ✅ App    : httpd:alpine
    📦 Version: v2 (Latest)
    ⚙️  Replicas: 2
    🌐 Service : svc-v2

---
# ============================================================
#  Deployment — V1
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd-v1
  labels:
    app: httpd
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: httpd
      version: v1
  template:
    metadata:
      labels:
        app: httpd
        version: v1
    spec:
      containers:
        - name: httpd
          image: httpd:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/local/apache2/htdocs/index.html
              subPath: index.html
      volumes:
        - name: html
          configMap:
            name: httpd-v1-config

---
# ============================================================
#  Deployment — V2
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: httpd-v2
  labels:
    app: httpd
    version: v2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: httpd
      version: v2
  template:
    metadata:
      labels:
        app: httpd
        version: v2
    spec:
      containers:
        - name: httpd
          image: httpd:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/local/apache2/htdocs/index.html
              subPath: index.html
      volumes:
        - name: html
          configMap:
            name: httpd-v2-config

---
# ============================================================
#  Service — V1
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: svc-v1
  labels:
    app: httpd
    version: v1
spec:
  selector:
    app: httpd
    version: v1
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP

---
# ============================================================
#  Service — V2
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: svc-v2
  labels:
    app: httpd
    version: v2
spec:
  selector:
    app: httpd
    version: v2
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
